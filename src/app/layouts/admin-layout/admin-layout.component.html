<!-- Sidebar -->
    <div class="admin-sidebar bg-dark" [class.show]="sidebarOpen">
      <div class="px-3 py-3 mb-2">
        <a class="text-white text-decoration-none d-flex align-items-center gap-2" routerLink="/admin/dashboard">
          <i class="bi bi-shop fs-4"></i>
          <span class="fs-5 fw-bold">ShopSmart</span>
        </a>
        <small class="text-white-50">Admin Panel</small>
      </div>
      <hr class="text-white-50 mx-3">
      <ul class="nav flex-column">
        <li class="nav-item">
          <a class="nav-link" routerLink="/admin/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
            <i class="bi bi-speedometer2"></i> Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/admin/products" routerLinkActive="active">
            <i class="bi bi-box-seam"></i> Products
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/admin/categories" routerLinkActive="active">
            <i class="bi bi-tags"></i> Categories
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/admin/users" routerLinkActive="active">
            <i class="bi bi-people"></i> Users
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/admin/orders" routerLinkActive="active">
            <i class="bi bi-receipt"></i> Orders
          </a>
        </li>
      </ul>
      <hr class="text-white-50 mx-3 mt-auto">
      <ul class="nav flex-column mb-3">
        <li class="nav-item">
          <a class="nav-link" routerLink="/">
            <i class="bi bi-house"></i> Back to Shop
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link cursor-pointer" (click)="logout()">
            <i class="bi bi-box-arrow-right"></i> Logout
          </a>
        </li>
      </ul>
    </div>

    <!-- Main content area -->
    <div class="admin-content">
      <!-- Top header -->
      <div class="admin-header border-bottom bg-body-tertiary">
        <button class="btn btn-outline-secondary d-lg-none me-auto" (click)="sidebarOpen = !sidebarOpen">
          <i class="bi bi-list"></i>
        </button>
        <!-- Theme toggle -->
        <button class="btn btn-outline-secondary btn-sm" (click)="toggleTheme()" title="Toggle theme">
          <i class="bi" [class.bi-moon-fill]="themeService.getTheme() === 'light'" [class.bi-sun-fill]="themeService.getTheme() === 'dark'"></i>
        </button>
        <div class="dropdown">
          <button class="btn btn-outline-secondary btn-sm dropdown-toggle" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle me-1"></i>Admin
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" routerLink="/profile"><i class="bi bi-person me-2"></i>Profile</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item cursor-pointer" (click)="logout()"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
          </ul>
        </div>
      </div>

      <!-- Page content -->
      <div class="p-4">
        <router-outlet></router-outlet>
      </div>
    </div>
